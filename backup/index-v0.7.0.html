<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>観劇手帳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>観劇手帳</h1>

<label for="title">公演名</label><br>
<input type="text" id="title"><br><br>

<label for="date">観劇日</label><br>
<input type="date" id="date"><br><br>

<label for="time">公演時間</label><br>
<input type="time" id="time"><br><br>

<label for="theater">会場</label><br>
<input type="text" id="theater"><br><br>

<label for="seat">座席</label><br>
<input type="text" id="seat" placeholder="例：S席1階12列24番"><br><br>

<label for="memo">感想</label><br>
<textarea id="memo" rows="5"></textarea><br><br>

<button id="saveButton">保存</button>

<h2>観劇記録一覧</h2>

<div id="recordList"></div>
    <script src="script.js"></script>
</body>
</html>
