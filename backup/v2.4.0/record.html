<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Note - 観劇記録</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Stage Note</h1>
<p>観劇記録</p>

<button onclick="location.href='index.html'">🏠 ホームへ戻る</button>

<hr>

<label for="recordTitle">公演名</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="recordTitle"
        autocomplete="off"
    >

    <div
        id="recordTitleSuggestions"
        class="autocompleteSuggestions">
    </div>
    
</div>

<br><br>

<label for="recordDate">観劇日</label><br>
<input type="date" id="recordDate"><br><br>

<label for="recordTime">開演時間</label><br>
<input type="time" id="recordTime"><br><br>

<label for="recordTheater">劇場</label><br>
<input type="text" id="recordTheater"><br><br>

<label for="recordSeat">座席</label><br>
<input
    type="text"
    id="recordSeat"
    placeholder="例：S席 1-12-24"
><br><br>

<label for="recordCast">出演者</label><br>
<input
    type="text"
    id="recordCast"
><br><br>

<label for="recordCompanion">同行者</label><br>
<input
    type="text"
    id="recordCompanion"
><br><br>

<label for="recordRate">評価</label><br>
<select id="recordRate">
    <option value="">選択してください</option>
    <option>★★★★★</option>
    <option>★★★★☆</option>
    <option>★★★☆☆</option>
    <option>★★☆☆☆</option>
    <option>★☆☆☆☆</option>
</select><br><br>

<label for="recordMemo">感想</label><br>
<textarea id="recordMemo" rows="5"></textarea><br><br>

<button id="recordSaveButton">保存</button>

<hr>

<h2>観劇記録一覧</h2>

<input
    type="text"
    id="recordSearch"
    placeholder="公演名・劇場・出演者・同行者で検索"
>

<button
    id="recordClearButton"
    type="button"
>
    ❌
</button>

<br><br>

<div id="recordList"></div>

<script src="autocomplete.js"></script>
<script src="record.js"></script>

</body>
</html>
