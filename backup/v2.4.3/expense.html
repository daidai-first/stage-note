<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Note - 遠征費管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Stage Note</h1>
<p>遠征費管理</p>

<button onclick="location.href='index.html'">🏠 ホームへ戻る</button>

<hr>

<label for="expenseTitle">遠征名</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="expenseTitle"
        autocomplete="off"
    >

    <div
        id="expenseTitleSuggestions"
        class="autocompleteSuggestions">
    </div>

</div>

<br><br>

<label for="expenseStartDate">開始日</label><br>
<input type="date" id="expenseStartDate"><br><br>

<label for="expenseEndDate">終了日</label><br>
<input type="date" id="expenseEndDate"><br><br>

<label for="expenseDestination">目的地</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="expenseDestination"
        autocomplete="off"
    >

    <div
        id="expenseDestinationSuggestions"
        class="autocompleteSuggestions">
    </div>

</div>

<br><br>

<label for="expenseTransportation">交通費</label><br>
<input type="number" id="expenseTransportation"><br><br>

<label for="expenseHotel">宿泊費</label><br>
<input type="number" id="expenseHotel"><br><br>

<label for="expenseFood">食費</label><br>
<input type="number" id="expenseFood"><br><br>

<label for="expenseGoods">グッズ代</label><br>
<input type="number" id="expenseGoods"><br><br>

<label for="expenseOther">その他</label><br>
<input type="number" id="expenseOther"><br><br>

<label>遠征合計</label><br>

<input
    type="text"
    id="expenseTotal"
    readonly
    value="0円"
><br><br>

<label for="expenseMemo">メモ</label><br>
<textarea id="expenseMemo" rows="5"></textarea><br><br>

<button id="expenseSaveButton">保存</button>

<hr>

<h2>遠征一覧</h2>

<input
    type="text"
    id="expenseSearch"
    placeholder="遠征名・目的地で検索"
>

<button
    id="expenseClearButton"
    type="button"
>
    ❌
</button>

<br><br>

<div id="expenseList"></div>

<script src="autocomplete.js"></script>
<script src="expense.js"></script>

</body>
</html>
