<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Note - 鑑賞記録</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Stage Note</h1>
<p>鑑賞記録</p>

<button onclick="location.href='index.html'">🏠 ホームへ戻る</button>

<hr>

<label for="recordTitle">公演名・タイトル</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="recordTitle"
        autocomplete="off"
    >

    <div
        id="recordTitleSuggestions"
        class="autocompleteSuggestions">
    </div>

</div>

<br><br>

<label for="recordDate">鑑賞日</label><br>
<input type="date" id="recordDate"><br><br>

<label for="recordTime">開演時間</label><br>
<input type="time" id="recordTime"><br><br>

<label for="recordTheater">会場</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="recordTheater"
        autocomplete="off"
    >

    <div
        id="recordTheaterSuggestions"
        class="autocompleteSuggestions">
    </div>

</div>

<br><br>

<label for="recordSeatType">席種</label><br>

<select id="recordSeatType">

    <option value="">選択してください</option>
    <option value="SS席">SS席</option>
    <option value="S席">S席</option>
    <option value="A席">A席</option>
    <option value="B席">B席</option>
    <option value="C席">C席</option>
    <option value="桟敷席">桟敷席</option>
    <option value="ボックス席">ボックス席</option>
    <option value="立見">立見</option>
    <option value="車椅子席">車椅子席</option>
    <option value="その他">その他</option>

</select>

<br><br>

<input
    type="text"
    id="recordSeatTypeOther"
    placeholder="席種を入力"
    style="display:none;"
>

<div id="recordSeatTypeOtherSuggestions"
     class="autocompleteSuggestions">
</div>

<br><br>

<label for="recordSeatFloor">階</label><br>

<select id="recordSeatFloor">

    <option value="">選択してください</option>
    <option value="地下">地下</option>
    <option value="1階">1階</option>
    <option value="2階">2階</option>
    <option value="3階">3階</option>
    <option value="4階">4階</option>
    <option value="5階">5階</option>
    <option value="その他">その他</option>

</select>

<br><br>

<input
    type="text"
    id="recordSeatFloorOther"
    placeholder="階を入力"
    style="display:none;"
>

<div id="recordSeatFloorOtherSuggestions"
     class="autocompleteSuggestions">
</div>

<br><br>

<label for="recordSeatRow">列</label><br>

<input
    type="text"
    id="recordSeatRow"
    placeholder="例：12 または A"
>

<br><br>

<label for="recordSeatNumber">番</label><br>

<input
    type="text"
    id="recordSeatNumber"
    placeholder="例：24"
><br><br>

<label for="recordCast">出演者</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="recordCast"
        autocomplete="off"
    >

    <div
        id="recordCastSuggestions"
        class="autocompleteSuggestions">
    </div>

</div>

<br><br>

<label for="recordCompanion">同行者</label><br>

<div class="autocompleteBox">

    <input
        type="text"
        id="recordCompanion"
        autocomplete="off"
    >

    <div
        id="recordCompanionSuggestions"
        class="autocompleteSuggestions">
    </div>

</div>

<br><br>

<label for="recordRate">評価</label><br>
<select id="recordRate">
    <option value="">選択してください</option>
    <option>★★★★★</option>
    <option>★★★★☆</option>
    <option>★★★☆☆</option>
    <option>★★☆☆☆</option>
    <option>★☆☆☆☆</option>
</select><br><br>

<label for="recordMemo">感想</label><br>
<textarea id="recordMemo" rows="5"></textarea><br><br>

<button id="recordSaveButton">保存</button>

<hr>

<h2>鑑賞記録一覧</h2>

<input
    type="text"
    id="recordSearch"
    placeholder="公演名・会場・出演者・同行者で検索"
>

<button
    id="recordClearButton"
    type="button"
>
    ❌
</button>

<br><br>

<div id="recordList"></div>

<script src="autocomplete.js"></script>
<script src="record.js"></script>

</body>
</html>
